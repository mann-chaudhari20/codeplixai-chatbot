<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodePlixAI Chat</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>

    <div class="chat-container">
      <div class="chat-header">
        <h2>CodePlixAI Assistant</h2>
        <p>Ask me anything about our services</p>
      </div>
      <div class="chat-box" id="chatBox">
        <div class="message bot-message">
          Hi! I'm the CodePlixAI assistant. How can I help you today?
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask us anything..."/>
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>

</html>
